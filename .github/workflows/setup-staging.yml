
name: "Setup — Staging Server"

on:
  workflow_dispatch:   # Manual trigger only — no automatic runs

jobs:
  setup:
    name: "Install Docker on Staging VM"
    runs-on: self-hosted

    steps:
      # ── Step 1: Configure passwordless sudo ────────────────────────────────
      # Pipeline SSH sessions are non-interactive — no terminal to type a password.
      # sudo -S reads the password from stdin via SUDO_PASS secret.
      # The guard makes this step safe to re-run.
      - name: Configure passwordless sudo
        env:
          SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
        run: |
          echo "$SSH_KEY" > /tmp/staging_key
          chmod 600 /tmp/staging_key

          ssh -i /tmp/staging_key -o StrictHostKeyChecking=no \
            ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "if sudo -n true 2>/dev/null; then
              echo '=== Passwordless sudo already configured — skipping ==='
            else
              echo '=== Configuring passwordless sudo ==='
              echo '${{ secrets.SUDO_PASS }}' | sudo -S bash -c \
                'echo \"${{ secrets.STAGING_USER }} ALL=(ALL) NOPASSWD:ALL\" > /etc/sudoers.d/${{ secrets.STAGING_USER }} && chmod 0440 /etc/sudoers.d/${{ secrets.STAGING_USER }}'
              echo '=== Passwordless sudo configured ==='
            fi"

          rm /tmp/staging_key

      # ── Step 2: Install Docker Engine ──────────────────────────────────────
      # Uses the official get.docker.com convenience script — supported on
      # Ubuntu 22.04 (Jammy) and 24.04 (Noble).
      # $(whoami) expands on the Staging VM at runtime — no hardcoded username.
      # The 'if ! command -v docker' guard makes this step safe to re-run.
      - name: Install Docker on Staging VM
        env:
          SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
        run: |
          echo "$SSH_KEY" > /tmp/staging_key
          chmod 600 /tmp/staging_key

          ssh -i /tmp/staging_key -o StrictHostKeyChecking=no \
            ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << 'EOF'
          set -e
          if ! command -v docker &> /dev/null; then
            echo "=== Docker not found — installing ==="
            curl -fsSL https://get.docker.com -o get-docker.sh
            sudo sh get-docker.sh
            sudo usermod -aG docker $(whoami)
            sudo mkdir -p /opt/app && sudo chown $(whoami):$(whoami) /opt/app
            rm get-docker.sh
            echo "=== Docker installed successfully ==="
          else
            echo "=== Docker already present — skipping install ==="
            sudo mkdir -p /opt/app && sudo chown $(whoami):$(whoami) /opt/app
          fi
          EOF

          rm /tmp/staging_key

      # ── Step 3: Verify the installation ────────────────────────────────────
      # Confirms Docker and Docker Compose are available before deploy-staging.yml runs.
      - name: Verify Docker
        env:
          SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
        run: |
          echo "$SSH_KEY" > /tmp/staging_key
          chmod 600 /tmp/staging_key

          ssh -i /tmp/staging_key -o StrictHostKeyChecking=no \
            ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << 'EOF'
          set -e
          echo "=== Logged in as: $(whoami) ==="
          docker --version
          docker compose version
          ls -la /opt/app
          echo "=== Staging server is ready for deployment ==="
          EOF

          rm /tmp/staging_key
